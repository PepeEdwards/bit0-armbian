# bit0: keep the systemd journal in RAM only.
#
# The handheld loses power uncleanly (dead battery / power-button glitch). The
# persistent journal was both the busiest routine writer to the SD *and*, in
# practice, one of the files a power cut actually corrupted
# (/var/log/journal/.../system.journal, seen in an e2fsck of a yanked card).
#
# Storage=volatile writes the journal to /run (tmpfs) only, so it never touches
# the card: a power cut can't corrupt it and it stops hammering the flash.
# RuntimeMaxUse bounds RAM use on the 128 MB target (the journal is small and
# expendable on an appliance; logs simply reset each boot).
[Journal]
Storage=volatile
RuntimeMaxUse=8M
