# Bit0: modules that must be present at boot.
# ili9341_fb and ads7846 autoload via their DT compatibles; listed anyway so a
# failure is visible in `systemctl status systemd-modules-load` instead of a
# silently black screen. uinput has no device to match and MUST be listed.
uinput
ili9341_fb
ads7846
mmc_spi
