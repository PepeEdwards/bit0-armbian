# Bit0: modules that must be present at boot.
# panel_mipi_dbi and ads7846 autoload via their DT compatibles; listed anyway
# so a failure is visible in `systemctl status systemd-modules-load` instead
# of a silently black screen. uinput has no device to match and MUST be listed.
uinput
panel_mipi_dbi
pwm_bl
ads7846
mmc_spi
# USB gadget serial console on the OTG port: shows up as a COM port on the
# PC (CDC-ACM); a login getty runs on ttyGS0 (see customize-image.sh).
g_serial
