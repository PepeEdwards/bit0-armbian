# Volume keys from the bit-0 keyboard (consumer HID -> uart-hid-bridge ->
# KEY_VOLUME* on the "Lyra UART Keyboard" uinput device). thd runs the
# amixer command; nothing else on the system listens for these keys.
KEY_VOLUMEUP	1	/usr/bin/amixer -q set Master 10%+
KEY_VOLUMEDOWN	1	/usr/bin/amixer -q set Master 10%-
# 'Master' has no playback switch, so amixer toggle does nothing; mute the
# digital level instead (this keyboard has no mute key, so it's belt-and-braces).
KEY_MUTE	1	/usr/bin/amixer -q set Master 0%
