# Only KEY_MUTE arrives here: the uart-hid-bridge consumes the volume-up/down
# consumer usages itself (calls bit0-vol directly so volume works even while
# SDL holds an exclusive grab in-game) and never injects KEY_VOLUMEUP/DOWN.
# 'Master' has no playback switch (softvol), so mute = digital level to 0
# (this keyboard has no mute key, so it's belt-and-braces).
KEY_MUTE	1	/usr/local/bin/bit0-vol mute
