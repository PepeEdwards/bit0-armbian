# Bit0 handheld — Luckfox Lyra (base board): Rockchip RK3506G2 triple Cortex-A7, 128MB, SD boot
# Modeled on config/boards/luckfox-lyra-plus.csc; the base Lyra has no upstream Armbian config.
BOARD_NAME="Bit0 (Luckfox Lyra)"
BOARD_VENDOR="luckfox"
BOARDFAMILY="rockchip"
BOOTCONFIG="luckfox-lyra-rk3506_defconfig"
KERNEL_TARGET="vendor"
KERNEL_TEST_TARGET="vendor"
BOOT_FDT_FILE="rk3506g-luckfox-lyra-sd.dtb"
BOOT_SCENARIO="spl-blobs"
IMAGE_PARTITION_TABLE="gpt"
SERIALCON="ttyFIQ0"
BOOT_SOC="rk3506"

# Board only has 128MB RAM; use 'lowmem' extension to optimize for this.
enable_extension "lowmem"
